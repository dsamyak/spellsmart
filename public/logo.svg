<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A38" />
      <stop offset="50%" stop-color="#3B1877" />
      <stop offset="100%" stop-color="#7209B7" />
    </linearGradient>

    <!-- Magic Swirl Gradient -->
    <linearGradient id="swirl" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CC9F0" />
      <stop offset="50%" stop-color="#7209B7" />
      <stop offset="100%" stop-color="#F72585" />
    </linearGradient>

    <!-- Book Cover Gradient -->
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A0CA3" />
      <stop offset="100%" stop-color="#7209B7" />
    </linearGradient>
    
    <!-- Cover Border Gradient -->
    <linearGradient id="coverBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F72585" />
      <stop offset="100%" stop-color="#4CC9F0" />
    </linearGradient>

    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEE440" />
      <stop offset="50%" stop-color="#FFBA08" />
      <stop offset="100%" stop-color="#F48C06" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Base Rectangle -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="url(#bg)" filter="url(#shadow)" />
  
  <!-- Inner Border for Glassy Effect -->
  <rect x="26" y="26" width="460" height="460" rx="114" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="4" />

  <!-- Background Magic Swirls -->
  <path d="M 80 400 C 120 200, 380 450, 420 120 C 450 60, 280 150, 240 80" fill="none" stroke="url(#swirl)" stroke-width="24" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <path d="M 120 180 C 200 80, 220 420, 380 320 C 480 260, 320 200, 280 280" fill="none" stroke="url(#swirl)" stroke-width="14" stroke-linecap="round" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Subtle Radial Glow Behind Book -->
  <circle cx="256" cy="280" r="140" fill="#4CC9F0" opacity="0.2" filter="url(#glow)"/>
  <circle cx="256" cy="280" r="90" fill="#F72585" opacity="0.25" filter="url(#glow)"/>

  <!-- Magic Book Model -->
  <g filter="url(#shadow)" transform="translate(0, 30)">
    <!-- Book Back Cover -->
    <path d="M 90 240 L 256 310 L 422 240 L 422 270 L 256 340 L 90 270 Z" fill="url(#cover)" stroke="url(#coverBorder)" stroke-width="3" stroke-linejoin="round"/>
    
    <!-- Left Pages Side Block -->
    <path d="M 105 245 L 256 305 L 256 332 L 105 272 Z" fill="#D8E2EA" />
    <!-- Right Pages Side Block -->
    <path d="M 407 245 L 256 305 L 256 332 L 407 272 Z" fill="#B9C6D2" />
    
    <!-- Left Top Page surface -->
    <path d="M 105 245 C 160 215, 220 235, 256 265 L 256 305 C 220 275, 160 255, 105 285 Z" fill="#FFFFFF" />
    <!-- Right Top Page surface -->
    <path d="M 407 245 C 352 215, 292 235, 256 265 L 256 305 C 292 275, 352 255, 407 285 Z" fill="#F0F4F8" />
    
    <!-- Book Spine Crease -->
    <path d="M 256 265 L 256 335" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" />
    
    <!-- Additional Pages Lines for Texture -->
    <path d="M 105 255 L 256 315 M 105 265 L 256 325" stroke="#CBD5E1" stroke-width="1.5" />
    <path d="M 407 255 L 256 315 M 407 265 L 256 325" stroke="#94A3B8" stroke-width="1.5" />

    <!-- Bookmark Ribbon -->
    <path d="M 248 265 L 235 400 L 256 415 L 277 400 L 264 265 Z" fill="url(#gold)" filter="url(#softGlow)"/>
    <path d="M 248 265 L 235 400 L 256 415 L 277 400 L 264 265 Z" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>

  <!-- Exploding Magical Letters -->
  <g font-family="'Baloo 2', 'Poppins', system-ui, -apple-system, sans-serif" font-weight="800" text-anchor="middle" filter="url(#glow)">
    <!-- A -->
    <text x="170" y="180" font-size="82" fill="url(#gold)" transform="rotate(-15 170 180)">A</text>
    <!-- B -->
    <text x="256" y="130" font-size="96" fill="#4CC9F0" transform="rotate(5 256 130)">B</text>
    <!-- C -->
    <text x="340" y="160" font-size="74" fill="#F72585" transform="rotate(20 340 160)">C</text>
    
    <!-- Small floating letters -->
    <text x="130" y="100" font-size="36" fill="#4CC9F0" opacity="0.8" transform="rotate(-30 130 100)">e</text>
    <text x="380" y="100" font-size="42" fill="url(#gold)" opacity="0.8" transform="rotate(25 380 100)">z</text>
    <text x="210" y="60" font-size="30" fill="#F72585" opacity="0.7" transform="rotate(-10 210 60)">x</text>
  </g>
  
  <!-- Sparkles & Stars -->
  <g fill="url(#gold)" filter="url(#glow)">
    <path d="M 110 80 Q 120 80 120 70 Q 120 80 130 80 Q 120 80 120 90 Q 120 80 110 80 Z" transform="scale(1.5) translate(-40, -10)"/>
    <path d="M 380 60 Q 390 60 390 50 Q 390 60 400 60 Q 390 60 390 70 Q 390 60 380 60 Z" transform="scale(2) translate(-190, -10)"/>
    <path d="M 420 220 Q 425 220 425 215 Q 425 220 430 220 Q 425 220 425 225 Q 425 220 420 220 Z" transform="scale(2.5) translate(-260, -135)"/>
    <path d="M 90 260 Q 95 260 95 255 Q 95 260 100 260 Q 95 260 95 265 Q 95 260 90 260 Z" transform="scale(1.8) translate(-40, -75)"/>
    <path d="M 280 40 Q 285 40 285 35 Q 285 40 290 40 Q 285 40 285 45 Q 285 40 280 40 Z" transform="scale(2) translate(-140, 2)"/>
  </g>
  
  <!-- Floating Orbs -->
  <circle cx="160" cy="220" r="8" fill="#4CC9F0" filter="url(#glow)"/>
  <circle cx="360" cy="190" r="6" fill="#F72585" filter="url(#glow)"/>
  <circle cx="230" cy="80" r="5" fill="url(#gold)" filter="url(#glow)"/>
  <circle cx="390" cy="280" r="7" fill="#4CC9F0" filter="url(#glow)"/>
  <circle cx="120" cy="140" r="5" fill="#F72585" filter="url(#glow)"/>
</svg>
